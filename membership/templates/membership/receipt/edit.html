{% extends "membership/base.html" %}

{% block title %}Edit Receipt{% endblock %}

{% block content %}

<div class="container-fluid">

<form method="post">

{% csrf_token %}

<div class="card shadow">

<div class="card-header bg-primary text-white">

<h4 class="mb-0">

Edit Receipt

</h4>

</div>

<div class="card-body">

<div class="row">

<div class="col-md-2">

<label>Receipt No</label>

<input type="text"
       class="form-control"
       value="RC{{ receipt.receipt_no|stringformat:'06d' }}"
       readonly>

</div>

<div class="col-md-2">

<label>Date</label>

<input type="date"
       name="receipt_date"
       value="{{ receipt.receipt_date|date:'Y-m-d' }}"
       class="form-control">

</div>

<div class="col-md-4">

<label>Member</label>

<select name="member" class="form-select" required>

{% for member in members %}

<option value="{{ member.id }}"
{% if receipt.member.id == member.id %}selected{% endif %}>

{{ member.company_name }}

</option>

{% endfor %}

</select>

</div>

<div class="col-md-2">

<label>Payment Mode</label>

<select name="payment_mode"
        class="form-select">

{% for mode in payment_modes %}

<option
value="{{ mode.id }}"
{% if receipt.payment_mode.id == mode.id %}
selected
{% endif %}
>

{{ mode.name }}

</option>
{% endfor %}

</select>

</div>

<div class="col-md-2">

<label>Reference No</label>

<input type="text"
       name="reference_no"
       class="form-control"
       value="{{ receipt.reference_no }}">

</div>

</div>

<hr>

<div class="table-responsive">

<table class="table table-bordered"
       id="detailTable">

<thead class="table-dark">

<tr>

<th width="60">#</th>

<th>Fee</th>

<th width="180">Amount</th>

<th width="70"></th>

</tr>

</thead>

<tbody id="tbody">

{% for d in receipt.details.all %}
<tr>
    <td>{{ forloop.counter }}</td>

    <td>

    <select name="fee_master[]" class="form-select fee">

        <option value="">Select Fee</option>

        {% for fee in fees %}

        <option value="{{ fee.id }}"
                data-amount="{{ fee.default_amount }}"
                {% if fee.id == d.fee_master.id %}selected{% endif %}>

            {{ fee.fee_name }}

        </option>

        {% endfor %}

    </select>

</td>

    <td>
        <input type="number"
               step="0.01"
               name="amount[]"
               value="{{ d.amount }}"
               class="form-control amount">
    </td>

    <td>
        

        <button type="button"
                class="btn btn-danger remove">
            ×
        </button>
    </td>
</tr>
{% endfor %}



</tbody>

</table>

</div>

<button
type="button"
class="btn btn-primary"
id="addRow">

+ Add Row

</button>

<div class="row mt-3">

<div class="col-md-8">

<label>Remarks</label>

<textarea
name="remarks"
rows="3"
class="form-control">{{ receipt.remarks }}</textarea>
</div>

<div class="col-md-4">

<label>Total</label>

<input
type="text"
id="total"
class="form-control form-control-lg text-end"
value="{{ receipt.total_amount }}"
readonly>

</div>

</div>
<div class="card-footer text-end"></div>
<button class="btn btn-success">

💾 Update Receipt

</button>


<a href="{% url 'receipt_list' %}"
class="btn btn-secondary">

Cancel

</a>

</div>

</div>

</form>

</div>

<script>

function updateTotal(){

    let total = 0;

    document.querySelectorAll(".amount").forEach(function(input){

        total += parseFloat(input.value || 0);

    });

    document.getElementById("total").value = total.toFixed(2);

}


function updateSerial(){

    document.querySelectorAll("#tbody tr").forEach(function(row,index){

        row.cells[0].innerText = index + 1;

    });

}


// Auto amount from Fee Master
document.addEventListener("change",function(e){

    if(e.target.classList.contains("fee")){

        let amount = e.target.selectedOptions[0].dataset.amount || 0;

        e.target.closest("tr")
                .querySelector(".amount")
                .value = amount;

        updateTotal();

    }

});


// Amount Changed
document.addEventListener("input",function(e){

    if(e.target.classList.contains("amount")){

        updateTotal();

    }

});


// Add Row
document.getElementById("addRow").onclick=function(){

    let row = document.querySelector("#tbody tr").cloneNode(true);

row.querySelector(".fee").selectedIndex = 0;
row.querySelector(".amount").value = "";

document.getElementById("tbody").appendChild(row);

updateSerial();
updateTotal();

};


// Delete Row
document.addEventListener("click",function(e){

    if(e.target.classList.contains("remove")){

        let rows=document.querySelectorAll("#tbody tr");

        if(rows.length>1){

            e.target.closest("tr").remove();

            updateSerial();

            updateTotal();

        }

    }

});


updateSerial();
updateTotal();

</script>

{% endblock %}
