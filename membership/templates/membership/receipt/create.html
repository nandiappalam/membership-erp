{% extends "membership/base.html" %}

{% block title %}Receipt Voucher{% endblock %}

{% block content %}

<div class="container-fluid">

<form method="post">

{% csrf_token %}

<div class="card shadow">

<div class="card-header bg-primary text-white">

<h4 class="mb-0">Receipt Voucher</h4>

</div>

<div class="card-body">

<div class="row">

<div class="col-md-2">

<label>Receipt No</label>

<input type="text"
       class="form-control"
       value="RC{{ next_receipt_no|stringformat:'06d' }}"
       readonly>

</div>

<div class="col-md-2">

<label>Date</label>

<input type="date"
       name="receipt_date"
       value="{{ today|date:'Y-m-d' }}"
       class="form-control">

</div>

<div class="col-md-4">

<label>Member</label>

<select name="member"
        class="form-select"
        required>

<option value="">Select Member</option>

{% for member in members %}

<option value="{{ member.id }}">

{{ member.company_name }}

</option>

{% endfor %}

</select>

</div>

<div class="col-md-2">

<label>Payment Mode</label>

<select name="payment_mode"
        class="form-select">

{% for mode in payment_modes %}

<option value="{{ mode.id }}">

{{ mode.name }}

</option>

{% endfor %}

</select>

</div>

<div class="col-md-2">

<label>Reference No</label>

<input type="text"
       name="reference_no"
       class="form-control">

</div>

</div>

<hr>

<div class="table-responsive">

<table class="table table-bordered"
       id="detailTable">

<thead class="table-dark">

<tr>

<th width="60">#</th>

<th>Fee</th>

<th width="180">Amount</th>

<th width="70"></th>

</tr>

</thead>

<tbody id="tbody">

<tr>

<td>1</td>

<td>

<select
name="fee_master[]"
class="form-select fee">

<option value="">Select</option>

{% for fee in fees %}

<option
value="{{ fee.id }}"
data-amount="{{ fee.default_amount }}">

{{ fee.fee_name }}

</option>

{% endfor %}

</select>

</td>

<td>

<input
type="number"
step="0.01"
name="amount[]"
class="form-control amount">

</td>

<td>

<button
type="button"
class="btn btn-danger remove">

×

</button>

</td>

</tr>

</tbody>

</table>

</div>

<button
type="button"
class="btn btn-primary"
id="addRow">

+ Add Row

</button>

<div class="row mt-3">

<div class="col-md-8">

<label>Remarks</label>

<textarea
name="remarks"
rows="3"
class="form-control"></textarea>

</div>

<div class="col-md-4">

<label>Total</label>

<input
type="text"
id="total"
class="form-control form-control-lg text-end"
value="0.00"
readonly>

</div>

</div>

<hr>

<div class="d-flex justify-content-end gap-2">

    <button type="submit" class="btn btn-success">

        💾 Save Receipt

    </button>

    <a href="{% url 'receipt_list' %}"
       class="btn btn-secondary">

        Cancel

    </a>

</div>

</div>

</form>

</div>

<script>

function updateTotal(){

    let total = 0;

    document.querySelectorAll(".amount").forEach(function(input){

        total += parseFloat(input.value || 0);

    });

    document.getElementById("total").value = total.toFixed(2);

}


function updateSerial(){

    document.querySelectorAll("#tbody tr").forEach(function(row,index){

        row.cells[0].innerText = index + 1;

    });

}


// Auto amount from Fee Master
document.addEventListener("change",function(e){

    if(e.target.classList.contains("fee")){

        let amount = e.target.selectedOptions[0].dataset.amount || 0;

        e.target.closest("tr")
                .querySelector(".amount")
                .value = amount;

        updateTotal();

    }

});


// Amount Changed
document.addEventListener("input",function(e){

    if(e.target.classList.contains("amount")){

        updateTotal();

    }

});


// Add Row
document.getElementById("addRow").onclick=function(){

    let row=document.querySelector("#tbody tr").cloneNode(true);

    row.querySelector(".fee").selectedIndex=0;

    row.querySelector(".amount").value="";

    document.getElementById("tbody").appendChild(row);

    updateSerial();

};


// Delete Row
document.addEventListener("click",function(e){

    if(e.target.classList.contains("remove")){

        let rows=document.querySelectorAll("#tbody tr");

        if(rows.length>1){

            e.target.closest("tr").remove();

            updateSerial();

            updateTotal();

        }

    }

});


updateSerial();
updateTotal();

</script>

{% endblock %}
