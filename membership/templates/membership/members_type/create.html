{% extends "membership/base.html" %}

{% block title %}Create Membership Type{% endblock %}

{% block content %}

<form method="post">

{% csrf_token %}

<div class="card shadow">

<div class="card-header bg-success text-white">

<h4>Create Membership Type</h4>

</div>

<div class="card-body">

<div class="row">

<div class="col-md-6 mb-3">

<label>Name</label>

<input
type="text"
name="name"
class="form-control"
required>

</div>

<div class="col-md-3 mb-3">

<label>Fee</label>

<input
type="number"
step="0.01"
name="fee"
value="0"
class="form-control">

</div>

<div class="col-md-6 mb-3">
    <label>Membership Category</label>
    <select name="type" class="form-select">
        <option value="ANNUAL">Annual</option>
        <option value="LIFETIME">Lifetime</option>
    </select>
</div>

<div class="col-12 mb-3">

<label>Description</label>

<textarea
name="description"
class="form-control"
rows="4"></textarea>

</div>

<div class="col-md-12">

<div class="form-check">

<input
type="checkbox"
name="is_active"
checked
class="form-check-input">

<label class="form-check-label">

Active

</label>

</div>

</div>

</div>

</div>

<div class="card-footer">

<button class="btn btn-success">

Save

</button>

<a href="{% url 'members_type_list' %}"
class="btn btn-secondary">

Cancel

</a>

</div>

</div>

</form>

{% endblock %}
