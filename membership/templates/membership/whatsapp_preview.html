{% extends "membership/base.html" %}

{% block content %}

<h3>WhatsApp Reminder</h3>

<div class="card">

    <div class="card-body">

        <h5>Progress : {{ current }} / {{ total }}</h5>

        <hr>

        <p><strong>Member :</strong> {{ member.owner_name }}</p>

        <p><strong>Mobile :</strong> {{ member.mobile }}</p>

        <p><strong>Valid Upto :</strong>
            {{ member.membership_valid_upto|date:"d-m-Y" }}
        </p>

        <label><strong>Message</strong></label>

        <textarea
            class="form-control"
            rows="8"
            readonly>{{ message }}</textarea>

        <br>
<div class="mt-3">

    <a href="{{ whatsapp_url }}"
       target="_blank"
       class="btn btn-success">

        <i class="fa fa-whatsapp"></i>

        Open WhatsApp

    </a>

    <form method="post"
          action="{% url 'whatsapp_next' %}"
          class="d-inline">

        {% csrf_token %}

        <button class="btn btn-primary">

            ✔ Message Sent & Next

        </button>

    </form>

    <a href="{% url 'expiry_report' %}"
       class="btn btn-secondary">

        Cancel

    </a>

</div>

</div>

{% endblock %}
