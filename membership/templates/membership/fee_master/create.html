{% extends "membership/base.html" %}

{% block title %}Add Fee{% endblock %}

{% block content %}

<div class="container">

<form method="post">

{% csrf_token %}

<div class="card shadow">

<div class="card-header bg-primary text-white">

<h5 class="mb-0">Add Fee</h5>

</div>

<div class="card-body">

<div class="row">

<div class="col-md-6">

<label>Organisation</label>

<select name="organisation" class="form-select">

{% for org in organisations %}

<option value="{{ org.id }}">

{{ org.name }}

</option>

{% endfor %}

</select>

</div>

<div class="col-md-6">

<label>Fee Name</label>

<input
type="text"
name="fee_name"
class="form-control"
required>

</div>

<div class="col-md-4 mt-3">

<label>Fee Type</label>

<select
name="fee_type"
class="form-select">

{% for value,label in fee_types %}

<option value="{{ value }}">

{{ label }}

</option>

{% endfor %}

</select>

</div>

<div class="col-md-4 mt-3">

<label>Default Amount</label>

<input
type="number"
step="0.01"
name="default_amount"
class="form-control">

</div>

<div class="col-md-4 mt-3">

<label>Status</label>

<div class="form-check mt-2">

<input
type="checkbox"
name="is_active"
checked
class="form-check-input">

<label class="form-check-label">

Active

</label>

</div>

</div>

<div class="col-md-12 mt-3">

<label>Description</label>

<textarea
name="description"
rows="4"
class="form-control"></textarea>

</div>

</div>

</div>

<div class="card-footer">

<button class="btn btn-success">

Save

</button>

<a href="{% url 'fee_master_list' %}"
class="btn btn-secondary">

Cancel

</a>

</div>

</div>

</form>

</div>

{% endblock %}
