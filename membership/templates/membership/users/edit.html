{% extends "membership/base.html" %}

{% block title %}Edit User{% endblock %}

{% block content %}

<div class="card shadow">

    <div class="card-header bg-warning">
        <h4>Edit User</h4>
    </div>

    <div class="card-body">

        <form method="post" enctype="multipart/form-data">

            {% csrf_token %}

            <div class="row">

                <div class="col-md-6 mb-3">
                    <label>Username</label>
                    <input type="text"
                           name="username"
                           value="{{ user.username }}"
                           class="form-control">
                </div>

                <div class="col-md-6 mb-3">
                    <label>Full Name</label>
                    <input type="text"
                           name="first_name"
                           value="{{ user.first_name }}"
                           class="form-control">
                </div>

                <div class="col-md-6 mb-3">
                    <label>Email</label>
                    <input type="email"
                           name="email"
                           value="{{ user.email }}"
                           class="form-control">
                </div>

                <div class="col-md-6 mb-3">
                    <label>Mobile</label>
                    <input type="text"
                           name="mobile"
                           value="{{ profile.mobile }}"
                           class="form-control">
                </div>

                <div class="col-md-6 mb-3">
                    <label>Role</label>

                    <select name="role" class="form-select">

                        <option value="SUPER_ADMIN"
                            {% if profile.role == "SUPER_ADMIN" %}selected{% endif %}>
                            Super Admin
                        </option>

                        <option value="ADMIN"
                            {% if profile.role == "ADMIN" %}selected{% endif %}>
                            Admin
                        </option>

                        <option value="USER"
                            {% if profile.role == "USER" %}selected{% endif %}>
                            User
                        </option>

                    </select>

                </div>

                {% if profile.photo %}
        <div class="mb-2">
            <img src="{{ profile.photo.url }}"
                 alt="User Photo"
                 width="120"
                 class="img-thumbnail">
        </div>
    {% else %}
        <p class="text-muted">No photo uploaded.</p>
    {% endif %}

    <input type="file"
           name="photo"
           class="form-control">

</div>

            <button class="btn btn-success">
                Update User
            </button>

            <a href="{% url 'user_list' %}" class="btn btn-secondary">
                Back
            </a>

        </form>

    </div>

</div>

{% endblock %}
